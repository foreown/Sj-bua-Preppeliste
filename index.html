<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Kjøkken</title>
<meta name="theme-color" content="#C9CED1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Kjøkken" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />

<script>
/* Sett tema FØR siden tegnes – hindrer hvitt blink i mørkt tema (gjelder både nettside og PWA) */
(function () {
  try {
    var t = localStorage.getItem("kitchen_theme_v1");
    if (t !== "light" && t !== "dark") {
      t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
    var m = document.querySelector('meta[name="theme-color"]');
    if (m) m.setAttribute("content", t === "dark" ? "#1B1F22" : "#C9CED1");
  } catch (e) {
    document.documentElement.setAttribute("data-theme", "light");
  }
})();
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.0"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#E7EBED; --surface:#FFFFFF; --ink:#161A1C; --muted:#6A7176;
    --line:#E2E6E8; --line-strong:#D2D7DA;
    --done:#13863F; --done-deep:#0F6E33; --done-tint:#EAF6EE;
    --alert-ink:#B03A0C; --alert-bg:#FFF3E8; --alert-line:#F4D3B6;
    --warn-ink:#9A6700; --warn-bg:#FFF8E6; --warn-line:#F1E0A6;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.4;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom);}
  .wrap{max-width:580px;margin:0 auto;}

  .steel{position:sticky;top:0;z-index:20;padding-top:env(safe-area-inset-top);
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0) 0, rgba(255,255,255,.28) 1px, rgba(0,0,0,.018) 2px, rgba(255,255,255,0) 3px),
      linear-gradient(180deg,#DBE0E2 0%,#CBD0D3 46%,#C2C7CA 56%,#D4D8DA 100%);
    border-bottom:1px solid var(--line-strong);box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .topbar{max-width:580px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:11px;padding:12px 16px;}
  .brand{display:flex;flex-direction:column;gap:1px;min-width:0;}
  .brand h1{margin:0;font-size:17px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#13171A;}
  .brand .who{font-size:11px;color:#4C5358;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .who .role{font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.9);padding:1px 6px;border-radius:99px;margin-left:6px;color:#3C4348;text-transform:uppercase;letter-spacing:.05em;}
  .logout{flex:none;font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5A6166;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.85);padding:8px 12px;border-radius:9px;cursor:pointer;}
  .logout:active{transform:scale(.97);}
  .offbar{background:var(--alert-bg);color:#8A2D08;font-size:12px;font-weight:600;text-align:center;padding:7px 12px;border-bottom:1px solid var(--alert-line);}

  .tabs{max-width:580px;margin:0 auto;display:flex;gap:6px;padding:12px 12px 4px;overflow-x:auto;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;text-align:center;font-size:12.5px;font-weight:700;letter-spacing:.02em;color:#6A7176;background:var(--surface);border:1px solid var(--line);padding:11px 16px;border-radius:11px;cursor:pointer;white-space:nowrap;transition:all .15s ease;}
  .tab.on{color:#fff;background:#262B2E;border-color:#262B2E;}

  .pad{padding:12px 14px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#8A9197;margin-bottom:10px;}

  label.fld{display:block;margin-bottom:11px;}
  label.fld .lab{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.02em;margin-bottom:5px;display:block;}
  input.in, select.in{width:100%;font-family:var(--sans);font-size:16px;color:var(--ink);background:#FBFCFC;border:1.5px solid var(--line-strong);border-radius:10px;padding:12px 13px;outline:none;transition:border-color .15s ease;-webkit-appearance:none;appearance:none;}
  select.in{background-image:linear-gradient(45deg,transparent 50%,#8A9197 50%),linear-gradient(135deg,#8A9197 50%,transparent 50%);background-position:calc(100% - 18px) center, calc(100% - 13px) center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:34px;}
  input.in:focus, select.in:focus{border-color:var(--done);background-color:#fff;}
  input.in::placeholder{color:#A9AFB3;}
  .chk{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);margin-bottom:11px;cursor:pointer;}
  .chk input{width:18px;height:18px;}

  .btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:700;letter-spacing:.02em;border-radius:11px;transition:transform .1s ease,opacity .15s ease,background .15s ease;}
  .btn:active{transform:scale(.98);}
  .btn[disabled]{opacity:.5;cursor:default;}
  .btn-primary{width:100%;background:var(--done);color:#fff;font-size:15px;padding:14px;}
  .btn-primary:active{background:var(--done-deep);}
  .btn-sm{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:9px 13px;background:#EEF1F2;color:#3C4348;border:1px solid var(--line);}
  .btn-sm.armed{background:var(--alert-bg);color:var(--alert-ink);border-color:var(--alert-line);}
  .btn-danger{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:9px 13px;background:#fff;color:var(--alert-ink);border:1px solid var(--alert-line);}
  .btn-danger.armed{background:var(--alert-bg);}

  .msg{font-size:13px;border-radius:10px;padding:10px 12px;margin-bottom:12px;}
  .msg.err{background:var(--alert-bg);border:1px solid var(--alert-line);color:#8A2D08;}
  .msg.ok{background:var(--done-tint);border:1px solid #CDE9D6;color:var(--done-deep);}
  .msg.info{background:#EEF3F5;border:1px solid var(--line);color:#4C5358;}

  .row{margin-top:4px;font-family:var(--mono);font-size:12.5px;color:#4C5358;}
  .plist{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
  .pitem{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px;}
  .pitem .check{flex:none;margin-top:1px;width:26px;height:26px;border-radius:8px;border:2px solid var(--line-strong);background:#fff;display:grid;place-items:center;cursor:pointer;transition:.15s;}
  .pitem .check svg{width:15px;height:15px;stroke:#fff;stroke-width:3.4;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:24;stroke-dashoffset:24;transition:stroke-dashoffset .2s ease;}
  .pitem.done .check{background:var(--done);border-color:var(--done);}
  .pitem.done .check svg{stroke-dashoffset:0;}
  .pbody{flex:1;min-width:0;cursor:pointer;}
  .pbody .pt{font-size:15.5px;font-weight:600;letter-spacing:-.005em;}
  .pitem.done .pbody .pt{color:#5C6B61;text-decoration:line-through;text-decoration-color:rgba(19,134,63,.5);text-decoration-thickness:2px;}
  .pbody .pn{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .pmeta{font-size:11px;color:#9AA1A6;margin-top:5px;letter-spacing:.01em;}
  .pdel{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#B7BDC1;display:grid;place-items:center;cursor:pointer;font-size:16px;line-height:1;transition:.15s;}
  .pdel.armed{background:var(--alert-bg);border-color:var(--alert-line);color:var(--alert-ink);}
  .empty{text-align:center;color:#9AA1A6;font-size:13.5px;padding:26px 10px;}

  .bbtag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:7px;margin-left:6px;}
  .bb-exp{background:var(--alert-bg);color:var(--alert-ink);border:1px solid var(--alert-line);}
  .bb-soon{background:var(--warn-bg);color:var(--warn-ink);border:1px solid var(--warn-line);}

  .wrow{display:flex;flex-direction:column;gap:10px;background:#FBFCFC;border:1px solid var(--line);border-radius:12px;padding:12px;}
  .wrow + .wrow{margin-top:9px;}
  .wtop{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .wname{font-size:15px;font-weight:700;}
  .wuser{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:1px;}
  .wactions{display:flex;gap:8px;flex-wrap:wrap;}
  .pwline{display:flex;gap:8px;}
  .pwline input{flex:1;}
  .rbadge{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle;}
  .r-admin{background:#ECEAF6;color:#5B53C6;border:1px solid #D9D5F0;}
  .r-worker{background:#EEF1F2;color:#5A6166;border:1px solid var(--line);}
  .r-owner{background:#FBEFD6;color:#8A5A00;border:1px solid #F0DCA8;}

  .chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:9px 15px;border-radius:99px;border:1px solid var(--line);background:var(--surface);font-size:13px;font-weight:700;color:#5A6166;white-space:nowrap;cursor:pointer;transition:.15s;}
  .chip.on{background:#262B2E;color:#fff;border-color:#262B2E;}
  .chip.add{color:var(--done);border-style:dashed;border-color:#BFE0CB;}

  .alert{display:flex;align-items:center;gap:11px;background:var(--alert-bg);border:1px solid var(--alert-line);border-radius:12px;padding:10px 13px;color:var(--alert-ink);text-decoration:none;margin-bottom:12px;}
  .alert:active{transform:scale(.99);}
  .alert .ico{flex:none;width:28px;height:28px;border-radius:8px;background:#fff;border:1px solid var(--alert-line);display:grid;place-items:center;font-size:14px;}
  .alert .txt{display:flex;flex-direction:column;line-height:1.2;min-width:0;}
  .alert .txt b{font-size:12px;font-weight:700;}
  .alert .txt span{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.06em;color:#8A2D08;}
  .listhead{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:2px 4px 0;}
  .listhead .hbtns{display:flex;gap:7px;}
  .stamp{flex:none;align-self:center;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--done-deep);background:var(--done-tint);border:1px solid #CDE9D6;padding:3px 8px;border-radius:8px;white-space:nowrap;}
  .resetwrap{text-align:center;padding:16px 4px 4px;}

  .editrow{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px;display:flex;flex-direction:column;gap:8px;}
  .editactions{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .moves{display:flex;gap:6px;}
  .iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;color:#5A6166;font-size:16px;cursor:pointer;display:grid;place-items:center;}
  .iconbtn[disabled]{opacity:.4;cursor:default;}

  .unit{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
  .unit.avvik{border-color:var(--alert-line);background:#FFF8F4;}
  .unit-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .unit-name{font-size:16px;font-weight:700;}
  .unit-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .unit-last{font-size:13px;margin-top:8px;color:#4C5358;}
  .unit-last b{font-family:var(--mono);font-size:15px;}
  .tbadge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:7px;white-space:nowrap;}
  .t-ok{background:var(--done-tint);color:var(--done-deep);border:1px solid #CDE9D6;}
  .t-avvik{background:var(--alert-bg);color:var(--alert-ink);border:1px solid var(--alert-line);}
  .t-warn{background:var(--warn-bg);color:var(--warn-ink);border:1px solid var(--warn-line);}
  .banner-warn{background:var(--warn-bg);border:1px solid var(--warn-line);color:var(--warn-ink);font-size:13px;font-weight:600;border-radius:11px;padding:10px 13px;margin-bottom:10px;}
  .imgrow{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;}
  .composethumb{max-height:130px;max-width:100%;border-radius:11px;border:1px solid var(--line);display:block;margin-bottom:11px;}
  .msgimg{max-width:100%;max-height:280px;border-radius:11px;border:1px solid var(--line);display:block;margin-top:9px;}
  .readrow{display:flex;gap:8px;margin-top:11px;}
  .readrow input.in{flex:1;}
  .readrow .unitc{flex:none;align-self:center;font-family:var(--mono);font-size:13px;color:var(--muted);}
  .hist{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;}
  .histrow{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;padding:4px 0;color:#4C5358;}
  .histrow .hv{font-family:var(--mono);font-weight:600;}

  .msgcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:9px;}
  .msgcard.pinned{border-color:#F1E0A6;background:var(--warn-bg);}
  .msgcard.resolved{opacity:.6;}
  .msgbody{font-size:15px;font-weight:600;line-height:1.35;}
  .msgcard.resolved .msgbody{text-decoration:line-through;}
  .msgmeta{font-size:11.5px;color:#9AA1A6;margin-top:5px;}
  .msgacts{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
  .pinmark{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--warn-ink);margin-right:6px;}

  .statrow{display:flex;gap:10px;margin-bottom:8px;}
  .stat{flex:1;background:#FBFCFC;border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;}
  .stat .num{font-family:var(--mono);font-size:22px;font-weight:700;line-height:1;}
  .stat .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .hint2{font-size:11.5px;color:#9AA1A6;}
  .daynav{display:flex;align-items:center;gap:8px;margin:14px 0 0;}
  .daynav input[type=date]{flex:1;font-family:var(--sans);font-size:15px;color:var(--ink);background:#FBFCFC;border:1.5px solid var(--line-strong);border-radius:10px;padding:11px 12px;outline:none;}
  .daynav input[type=date]:focus{border-color:var(--done);background:#fff;}
  .daynav .nav{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:#fff;color:#5A6166;font-size:20px;cursor:pointer;display:grid;place-items:center;flex:none;}
  .daynav .nav[disabled]{opacity:.4;cursor:default;}
  .dayclear{text-align:center;margin-top:9px;}
  .daygroup{margin-top:16px;}
  .dayhead{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:capitalize;color:#4C5358;padding:0 4px 8px;}
  .logitem{display:flex;align-items:flex-start;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:7px;}
  .lbadge{flex:none;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;border-radius:7px;margin-top:1px;white-space:nowrap;}
  .b-done{background:var(--done-tint);color:var(--done-deep);border:1px solid #CDE9D6;}
  .b-miss{background:var(--alert-bg);color:var(--alert-ink);border:1px solid var(--alert-line);}
  .b-undo{background:#EEF1F2;color:#6A7176;border:1px solid var(--line);}
  .b-reset{background:#E7ECEF;color:#3C4348;border:1px solid var(--line-strong);}
  .lbody{flex:1;min-width:0;}
  .ltitle{font-size:14.5px;font-weight:600;}
  .llist{font-family:var(--mono);font-size:10.5px;color:#9AA1A6;margin-left:4px;}
  .lmeta{font-size:11.5px;color:#9AA1A6;margin-top:2px;}

  .login-hero{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:24px 18px;}
  .login-card{max-width:380px;width:100%;margin:0 auto;}
  .login-card .logo{display:flex;flex-direction:column;align-items:center;margin-bottom:22px;}
  .login-card .logo .mark{width:54px;height:54px;border-radius:15px;background:#262B2E;color:#fff;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:22px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,.15);}
  .login-card .logo h1{margin:0;font-size:20px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;}
  .login-card .logo p{margin:3px 0 0;font-size:12.5px;color:var(--muted);}
  .center-note{min-height:100dvh;display:grid;place-items:center;padding:24px;}
  .foot-note{text-align:center;font-size:11px;color:#9AA1A6;padding:18px;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}

  /* ---- tema-bryter ---- */
  .themebtn{flex:none;width:38px;height:38px;display:grid;place-items:center;border-radius:9px;cursor:pointer;
    color:#5A6166;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.85);padding:0;}
  .themebtn:active{transform:scale(.96);}
  .themebtn svg{display:block;width:18px;height:18px;}
  .themebtn.float{position:fixed;top:calc(env(safe-area-inset-top) + 12px);right:14px;z-index:30;}
  .topbtns{display:flex;align-items:center;gap:9px;flex:none;}

  /* =====================================================
     MØRKT TEMA – aktiveres via <html data-theme="dark">
     ===================================================== */
  :root[data-theme="dark"]{
    --bg:#15181A; --surface:#1E2327; --ink:#E8ECEE; --muted:#9AA2A8;
    --line:#2B3236; --line-strong:#3B4248;
    --done:#36B96D; --done-deep:#2C9C59; --done-tint:#16271C;
    --alert-ink:#FF9166; --alert-bg:#2E1A12; --alert-line:#5A3320;
    --warn-ink:#E8B24E; --warn-bg:#2C2410; --warn-line:#4A3D18;
  }
  [data-theme="dark"] .themebtn{color:#C7CDD1;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);}

  /* stål-header → børstet mørkt metall */
  [data-theme="dark"] .steel{
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0) 0, rgba(255,255,255,.04) 1px, rgba(0,0,0,.20) 2px, rgba(255,255,255,0) 3px),
      linear-gradient(180deg,#262B2E 0%,#1C2023 46%,#181B1E 56%,#21262A 100%);
    box-shadow:0 2px 12px rgba(0,0,0,.5);}
  [data-theme="dark"] .brand h1{color:#EEF2F3;}
  [data-theme="dark"] .brand .who{color:#AEB6BB;}
  [data-theme="dark"] .who .role{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.14);color:#C7CDD1;}
  [data-theme="dark"] .logout{color:#C7CDD1;background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);}
  [data-theme="dark"] .offbar{color:#FF9166;}

  /* faner + chips */
  [data-theme="dark"] .tab{color:#9AA2A8;}
  [data-theme="dark"] .tab.on{background:#2F363B;color:#FFFFFF;border-color:#4A5258;}
  [data-theme="dark"] .chip{color:#9AA2A8;}
  [data-theme="dark"] .chip.on{background:#2F363B;color:#FFFFFF;border-color:#4A5258;}
  [data-theme="dark"] .chip.add{color:var(--done);border-color:#2C5238;}

  /* felt + knapper */
  [data-theme="dark"] input.in, [data-theme="dark"] select.in{background:#171B1E;}
  [data-theme="dark"] input.in:focus, [data-theme="dark"] select.in:focus{background:#20262A;}
  [data-theme="dark"] input.in::placeholder{color:#6B7378;}

const nbDateTime = iso => { if(!iso) return ""; try{ return new Date(iso).toLocaleString("nb-NO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
const nbTime = iso => { if(!iso) return ""; try{ return new Date(iso).toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } };
const nbDay = iso => { try{ return new Date(iso).toLocaleDateString("nb-NO",{weekday:"long",day:"numeric",month:"long"}); }catch(e){ return ""; } };
const fmtStamp = iso => { if(!iso) return ""; try{ const d=new Date(iso); const p=n=>n<10?"0"+n:""+n; return p(d.getDate())+"."+p(d.getMonth()+1); }catch(e){ return ""; } };
const fmtDateShort = ds => { if(!ds) return ""; return fmtStamp(ds.length<=10? ds+"T12:00:00" : ds); };
const dayKey = iso => { try{ const d=new Date(iso); const p=n=>n<10?"0"+n:""+n; return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate()); }catch(e){ return ""; } };

function bbStatus(ds){
  if(!ds) return null;
  try{
    const today=new Date(); today.setHours(0,0,0,0);
    const bb=new Date((ds.length<=10?ds+"T00:00:00":ds));
    const diff=Math.round((bb-today)/86400000);
    if(diff<0) return {cls:"bb-exp",txt:"Utløpt"};
    if(diff===0) return {cls:"bb-exp",txt:"I dag"};
    if(diff<=2) return {cls:"bb-soon",txt:diff+" dg"};
    return {cls:"",txt:null};
  }catch(e){ return null; }
}
function rangeText(min,max){
  const has = v => v!==null && v!==undefined;
  if(has(min)&&has(max)) return min+"–"+max+" °C";
  if(has(max)) return "≤ "+max+" °C";
  if(has(min)) return "≥ "+min+" °C";
  return "Ingen grense satt";
}
function buildCSV(rows){
  const headers = rows.length ? Object.keys(rows[0]) : [];
  const esc = v => '"'+String(v==null?"":v).replace(/"/g,'""')+'"';
  return "\ufeff" + [headers.join(",")].concat(rows.map(r=>headers.map(h=>esc(r[h])).join(","))).join("\r\n");
}
function makeFile(name, text, mime){
  try{ return new File([text], name, { type:mime }); }
  catch(e){ const b=new Blob([text],{type:mime}); b.name=name; return b; }
}
/* Robust på både nettside og installert PWA:
   – mobil/PWA: systemets delingsark (Web Share m/ fil)
   – PC/Android: vanlig nedlasting
   – siste utvei: åpne i ny fane. navigator.share kalles synkront i klikket. */
async function saveOrShare(file){
  try{
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:file.name });
      return true;
    }
  }catch(e){ if(e && e.name==="AbortError") return true; }
  try{
    const url=URL.createObjectURL(file);
    const a=document.createElement("a"); a.href=url; a.download=file.name;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1500);
    return true;
  }catch(e){}
  try{
    const url=URL.createObjectURL(file);
    const w=window.open(url,"_blank");
    if(w) return true;
  }catch(e){}
  return false;
}

/* Krymp bilder fra mobil før opplasting (sparer lagring og data) */
function resizeImage(file, maxDim, quality){
  return new Promise((resolve)=>{
    try{
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = ()=>{
        try{
          let w = img.width, h = img.height;
          if(w >= h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
          else if(h > w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
          const cv = document.createElement("canvas"); cv.width=w; cv.height=h;
          cv.getContext("2d").drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url);
          if(cv.toBlob){ cv.toBlob((b)=>resolve(b||file), "image/jpeg", quality||0.82); }
          else resolve(file);
        }catch(e){ try{URL.revokeObjectURL(url);}catch(_){}; resolve(file); }
      };
      img.onerror = ()=>{ try{URL.revokeObjectURL(url);}catch(_){}; resolve(file); };
      img.src = url;
    }catch(e){ resolve(file); }
  });
}
async function uploadPhoto(file){
  const blob = await resizeImage(file, 1400, 0.82);
  const path = "msg/" + Date.now() + "-" + Math.random().toString(36).slice(2,9) + ".jpg";
  const up = await db.storage.from("kitchen-photos").upload(path, blob, { contentType:"image/jpeg", upsert:false });
  if(up.error) throw new Error(up.error.message || "Kunne ikke laste opp bildet");
  const pub = db.storage.from("kitchen-photos").getPublicUrl(path);
  return pub.data.publicUrl;
}

/* ---------- confirm ---------- */
function Confirm({label, ask, onConfirm, className}){
  const [armed,setArmed]=useState(false); const t=useRef(null);
  useEffect(()=>()=>clearTimeout(t.current),[]);
  return (
    <button className={(className||"")+(armed?" armed":"")}
      onClick={(e)=>{ e.stopPropagation();
        if(!armed){ setArmed(true); t.current=setTimeout(()=>setArmed(false),3000); }
        else { clearTimeout(t.current); setArmed(false); onConfirm(); } }}>
      {armed ? (ask||"Sikker?") : label}

}

function Login({onLogin, theme, onToggleTheme}){

/* ---------- PREP BOARD (med holdbarhet) ---------- */
function PrepPage({session, onAuthFail}){
  const [items,setItems]=useState([]);
  const [title,setTitle]=useState(""); const [note,setNote]=useState(""); const [bb,setBb]=useState("");
  const [err,setErr]=useState(""); const [loading,setLoading]=useState(true); const [busy,setBusy]=useState(false);

  const fetchItems = useCallback(async ()=>{
    try{ const data = await rpc("prep_get",{ p_token:session.token, p_list:"prep" }); setItems(data||[]); setErr(""); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setLoading(false);
  },[session.token, onAuthFail]);
  useEffect(()=>{ fetchItems(); const id=setInterval(fetchItems,20000); const onF=()=>fetchItems();
    window.addEventListener("focus",onF); return ()=>{ clearInterval(id); window.removeEventListener("focus",onF); }; },[fetchItems]);

  async function add(){
    if(!title.trim()) return; setBusy(true);
    try{ await rpc("prep_add",{ p_token:session.token, p_title:title.trim(), p_note:note.trim()||null, p_list:"prep", p_best_before:bb||null });
      setTitle(""); setNote(""); setBb(""); await fetchItems(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setBusy(false);
  }
  async function toggle(id){ try{ await rpc("prep_toggle",{ p_token:session.token, p_id:id }); await fetchItems(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); } }
  async function del(id){ try{ await rpc("prep_delete",{ p_token:session.token, p_id:id }); await fetchItems(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); } }

  const done = items.filter(i=>i.done).length;
  return (
    <div className="pad">
      <div className="panel">
        <div className="eyebrow">Legg til oppgave</div>
        <label className="fld"><input className="in" value={title} onChange={e=>setTitle(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") add(); }} placeholder="Hva må preppes? f.eks. Kutte agurk" /></label>
        <label className="fld"><input className="in" value={note} onChange={e=>setNote(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") add(); }} placeholder="Notat (valgfritt)" /></label>
        <label className="fld"><span className="lab">Best før (valgfritt)</span>
          <input className="in" type="date" value={bb} onChange={e=>setBb(e.target.value)} /></label>
        <button className="btn btn-primary" disabled={busy || !title.trim()} onClick={add}>{busy ? "Legger til…" : "Legg til"}</button>
      </div>
      {err && <div style={{marginTop:12}} className="msg err">{err}</div>}

        <div className="row">{done} / {items.length} gjort</div>
      </div>
      {loading ? <div className="empty">Laster…</div> :
        items.length === 0 ? <div className="empty">Ingen oppgaver enda.<br/>Legg til det som må preppes.</div> :
        <div className="plist">
          {items.map(it=>{ const b=bbStatus(it.best_before); return (
            <div key={it.id} className={"pitem"+(it.done?" done":"")}>
              <div className="check" onClick={()=>toggle(it.id)}><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg></div>

                {it.note && <div className="pn">{it.note}</div>}
                <div className="pmeta">
                  {"Laget "+fmtDateShort(it.created_at)}
                  {it.best_before ? " · Best før "+fmtDateShort(it.best_before) : ""}
                  {it.created_by ? " · "+it.created_by : ""}
                  {it.done && it.done_by ? "  ·  ✓ "+it.done_by : ""}

              </div>
              <Confirm className="pdel" label="×" ask="✓?" onConfirm={()=>del(it.id)} />
            </div>
          ); })}

    </div>
  );

  const fetchLists = useCallback(async ()=>{
    try{ const data = await rpc("lists_get",{ p_token:session.token }); const arr=data||[];
      setLists(arr); setActiveKey(prev => prev && arr.some(l=>l.key===prev) ? prev : (arr[0]?arr[0].key:null)); setErr(""); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setLoadingLists(false);
  },[session.token, onAuthFail]);
  const fetchItems = useCallback(async (key)=>{
    if(!key){ setItems([]); return; }
    setLoadingItems(true);
    try{ const data = await rpc("list_get",{ p_token:session.token, p_list:key }); setItems(data||[]); setErr(""); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setLoadingItems(false);
  },[session.token, onAuthFail]);

  useEffect(()=>{ fetchLists(); },[fetchLists]);
  useEffect(()=>{ if(activeKey) fetchItems(activeKey); },[activeKey, fetchItems]);
  useEffect(()=>{
    const busy = ()=> edit||settings||creating;
    const id=setInterval(()=>{ if(activeKey && !busy()) fetchItems(activeKey); }, 20000);
    const onF=()=>{ if(activeKey && !busy()) fetchItems(activeKey); };
    window.addEventListener("focus",onF);
    return ()=>{ clearInterval(id); window.removeEventListener("focus",onF); };
  },[activeKey, edit, settings, creating, fetchItems]);

  async function runOp(fn,args,after){
    try{ await rpc(fn,args); if(after) await after(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
  }
  async function toggle(id){
    setItems(list=>list.map(x=>x.id===id?{...x,done:!x.done,done_by:!x.done?session.display_name:null,done_at:!x.done?new Date().toISOString():null}:x));
    try{ await rpc("list_toggle",{p_token:session.token,p_id:id}); fetchItems(activeKey); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); fetchItems(activeKey); }
  }
  const reset = ()=> runOp("list_reset",{p_token:session.token,p_list:activeKey}, ()=>fetchItems(activeKey));
  async function addItem(){ if(!nt.trim()) return;
    await runOp("item_add",{p_token:session.token,p_list:activeKey,p_title:nt.trim(),p_note:nn.trim()||null}, ()=>fetchItems(activeKey));
    setNt(""); setNn(""); }
  const saveItem=(id,title,note)=> runOp("item_update",{p_token:session.token,p_id:id,p_title:title,p_note:note||null}, ()=>fetchItems(activeKey));
  const delItem=(id)=> runOp("item_delete",{p_token:session.token,p_id:id}, ()=>fetchItems(activeKey));
  const move=(id,dir)=> runOp("item_move",{p_token:session.token,p_id:id,p_dir:dir}, ()=>fetchItems(activeKey));

  function metaArgs(v){ return { p_title:v.title, p_alert_text:v.alert||null, p_stamp:v.stamp,
    p_reset_mode:v.mode, p_reset_hour:v.hour, p_reset_weekday:v.mode==="weekly"?v.weekday:null, p_reset_dom:v.mode==="monthly"?v.dom:null }; }
  async function createList(v){ await runOp("list_create",{ p_token:session.token, ...metaArgs(v) }, async ()=>{ setCreating(false); await fetchLists(); }); }
  async function saveMeta(v){ await runOp("list_meta_update",{ p_token:session.token, p_key:activeKey, ...metaArgs(v) }, async ()=>{ setSettings(false); await fetchLists(); }); }
  async function deleteList(){ await runOp("list_delete",{p_token:session.token,p_key:activeKey}, async ()=>{ setSettings(false); await fetchLists(); }); }

  const done = items.filter(i=>i.done).length;

  return (
    <div className="pad">
      <div className="chips">
        {lists.map(l=>(
          <button key={l.key} className={"chip"+(activeKey===l.key?" on":"")} onClick={()=>{ setEdit(false); setSettings(false); setCreating(false); setActiveKey(l.key); }}>{l.title}</button>
        ))}
        {isEditor && <button className="chip add" onClick={()=>{ setCreating(true); setSettings(false); setEdit(false); }}>+ Ny liste</button>}
      </div>

      {err && <div className="msg err">{err}</div>}

      {creating && isEditor &&
        <ListMetaForm submitLabel="Opprett liste" onSubmit={createList} onCancel={()=>setCreating(false)} />}

      {!creating && loadingLists ? <div className="empty">Laster…</div> :
       !creating && lists.length===0 ? <div className="empty">{isEditor?"Ingen lister enda. Trykk «+ Ny liste».":"Ingen lister enda."}</div> :
       !creating && active && <>
        {!edit && !settings && active.alert_text &&
          <a className="alert" href="sms:48494875">
            <span className="ico">✉︎</span>
            <span className="txt"><b>{active.alert_text}</b><span>48 49 48 75</span></span>
          </a>}

        <div className="listhead">
          <div className="eyebrow" style={{margin:0}}>{active.title}</div>
          {isEditor
            ? <div className="hbtns">
                <button className="btn btn-sm" onClick={()=>{ setEdit(e=>!e); setSettings(false); }}>{edit?"Ferdig":"Rediger"}</button>
                <button className="btn btn-sm" onClick={()=>{ setSettings(s=>!s); setEdit(false); }}>⚙</button>
              </div>
            : <div className="row">{done} / {items.length} ferdig</div>}
        </div>

        {settings && isEditor &&
          <>
            <ListMetaForm initial={active} submitLabel="Lagre liste" onSubmit={saveMeta} onCancel={()=>setSettings(false)} />
            <div className="resetwrap"><Confirm className="btn btn-danger" label="Slett hele lista" ask="Trykk igjen – slett lista" onConfirm={deleteList} /></div>
          </>}

        {edit && isEditor && !settings &&
          <div className="panel" style={{marginTop:10}}>
            <div className="eyebrow">Nytt punkt</div>
            <label className="fld"><input className="in" value={nt} onChange={e=>setNt(e.target.value)} placeholder="Tittel" onKeyDown={e=>{ if(e.key==="Enter") addItem(); }} /></label>
            <label className="fld"><input className="in" value={nn} onChange={e=>setNn(e.target.value)} placeholder="Notat (valgfritt)" onKeyDown={e=>{ if(e.key==="Enter") addItem(); }} /></label>
            <button className="btn btn-primary" disabled={!nt.trim()} onClick={addItem}>Legg til punkt</button>
          </div>}

        {!settings && (loadingItems ? <div className="empty">Laster…</div> :
          items.length===0 ? <div className="empty">Ingen punkter i lista.</div> :
          <div className="plist">
            {items.map((it,idx)=> edit && isEditor
              ? <EditRow key={it.id} item={it} first={idx===0} last={idx===items.length-1} onSave={saveItem} onDelete={delItem} onMove={move} />
              : <div key={it.id} className={"pitem"+(it.done?" done":"")}>
                  <div className="check" onClick={()=>toggle(it.id)}><svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6"/></svg></div>
                  <div className="pbody" onClick={()=>toggle(it.id)}>
                    <div className="pt">{it.title}</div>
                    {it.note && <div className="pn">{it.note}</div>}
                    {it.done && it.done_by && <div className="pmeta">✓ {it.done_by}{it.done_at? " · "+nbDateTime(it.done_at):""}</div>}
                  </div>
                  {active.stamp && it.done && <span className="stamp">{fmtStamp(it.done_at)}</span>}
                </div>
            )}
          </div>)}

        {isEditor && !edit && !settings && items.length>0 &&
          <div className="resetwrap">
            <Confirm className="btn btn-danger" label="Nullstill nå" ask="Trykk igjen – nullstill" onConfirm={reset} />
          </div>}
       </>}
    </div>
  );
}

/* ---------- TEMP-UNIT FORM ---------- */
function TempUnitForm({initial, submitLabel, onSubmit, onCancel}){

    <div className="panel" style={{marginTop:10}}>
      <div className="eyebrow">{submitLabel}</div>
      <label className="fld"><span className="lab">Navn</span>

      <label className="fld"><span className="lab">Type</span>

        <label className="fld" style={{flex:1}}><span className="lab">Min °C (valgfritt)</span>

        <label className="fld" style={{flex:1}}><span className="lab">Maks °C</span>
          <input className="in" type="number" step="0.1" value={max} onChange={e=>setMax(e.target.value)} placeholder="4" /></label>
      </div>
      <button className="btn btn-primary" disabled={!name.trim()} onClick={()=>onSubmit({ name:name.trim(), kind, min:num(min), max:num(max) })}>{submitLabel}</button>
      <div className="dayclear" style={{marginTop:8}}><button className="btn btn-sm" onClick={onCancel}>Avbryt</button></div>

  );
}

/* ---------- TEMPERATURLOGG ---------- */
function TempPage({session, onAuthFail}){
  const isEditor = session.role==="owner" || session.role==="admin";
  const [units,setUnits]=useState([]); const [loading,setLoading]=useState(true); const [err,setErr]=useState("");
  const [vals,setVals]=useState({}); const [notes,setNotes]=useState({}); const [hist,setHist]=useState({});
  const [editId,setEditId]=useState(null); const [creating,setCreating]=useState(false);
  const [tempExportText,setTempExportText]=useState("");

  const fetchUnits=useCallback(async()=>{
    try{ const data=await rpc("temp_units_get",{p_token:session.token}); setUnits(data||[]); setErr(""); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); }
    setLoading(false);
  },[session.token,onAuthFail]);
  const buildTempExport=useCallback(async()=>{
    if(!isEditor) return;
    try{ const data=await rpc("temp_export",{p_token:session.token});
      const rows=(data||[]).map(r=>({ dato:dayKey(r.tid), tid:nbTime(r.tid), enhet:r.enhet, type:(KIND_LABEL[r.type]||r.type),
        verdi_C:r.verdi, status:r.status, grense:rangeText(r.min,r.max), merknad:r.merknad||"", av:r.av||"" }));
      setTempExportText(rows.length? buildCSV(rows): ""); }
    catch(e){}
  },[session.token, isEditor]);
  useEffect(()=>{ fetchUnits(); const id=setInterval(()=>{ if(!editId&&!creating) fetchUnits(); },30000); const onF=()=>{ if(!editId&&!creating) fetchUnits(); };
    window.addEventListener("focus",onF); return ()=>{clearInterval(id); window.removeEventListener("focus",onF);}; },[fetchUnits, editId, creating]);
  useEffect(()=>{ buildTempExport(); const onF=()=>buildTempExport();
    window.addEventListener("focus",onF); return ()=>window.removeEventListener("focus",onF); },[buildTempExport]);

  async function loadHist(id){
    try{ const data=await rpc("temp_readings_get",{p_token:session.token,p_unit_id:id,p_limit:15}); setHist(s=>({...s,[id]:data||[]})); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); }
  }
  function toggleHist(id){ if(hist[id]) setHist(s=>{const n={...s};delete n[id];return n;}); else loadHist(id); }
  async function addReading(id){
    const raw=(vals[id]||"").replace(",",".").trim();
    if(raw==="" || isNaN(Number(raw))){ setErr("Skriv inn en temperatur"); return; }
    const u = units.find(x=>x.id===id); const val = Number(raw);
    const out = u && ((u.min_c!=null && val<u.min_c) || (u.max_c!=null && val>u.max_c));
    if(out && !(notes[id]||"").trim()){ setErr("Utenfor grensa – skriv en kort merknad om hva som ble gjort"); return; }
    try{ await rpc("temp_reading_add",{p_token:session.token,p_unit_id:id,p_value:val,p_note:(notes[id]||"").trim()||null});
      setVals(s=>({...s,[id]:""})); setNotes(s=>({...s,[id]:""})); setErr(""); await fetchUnits(); buildTempExport(); if(hist[id]) loadHist(id); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); }
  }
  function exportTemp(){
    if(!tempExportText){ setErr("Ingen temperaturlogg å eksportere ennå"); return; }
    setErr("");
    const file = makeFile("temperaturlogg.csv", tempExportText, "text/csv;charset=utf-8;");
    saveOrShare(file).then(ok=>{ if(!ok) setErr("Eksport støttes ikke i denne nettleseren."); }).catch(()=>{});
  }
  async function createUnit(v){ await safe("temp_unit_add",{p_token:session.token,p_name:v.name,p_kind:v.kind,p_min:v.min,p_max:v.max}, ()=>{ setCreating(false); }); }
  async function saveUnit(id,v){ await safe("temp_unit_update",{p_token:session.token,p_id:id,p_name:v.name,p_kind:v.kind,p_min:v.min,p_max:v.max}, ()=>{ setEditId(null); }); }
  async function delUnit(id){ await safe("temp_unit_delete",{p_token:session.token,p_id:id}, ()=>{ setEditId(null); }); }
  async function safe(fn,args,after){ try{ await rpc(fn,args); if(after) after(); await fetchUnits(); }catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); } }

  const todayKey = dayKey(new Date().toISOString());
  const loggedToday = (u)=> !!(u.last_at && dayKey(u.last_at)===todayKey);
  const missingToday = units.filter(u=>!loggedToday(u)).length;

  return (
    <div className="pad">
      <div className="listhead" style={{marginBottom:4}}>
        <div className="eyebrow" style={{margin:0}}>Temperaturkontroll</div>
        {isEditor && <button className="btn btn-sm" onClick={()=>{ setCreating(c=>!c); setEditId(null); }}>{creating?"Lukk":"+ Ny enhet"}</button>}
      </div>
      <div className="hint2" style={{margin:"0 4px 10px"}}>Logg temperatur på kjøl/frys. Avvik utenfor grensene markeres rødt og krever en kort merknad.</div>

      {!loading && units.length>0 && missingToday>0 &&
        <div className="banner-warn">{missingToday===1 ? "1 enhet er ikke logget i dag" : missingToday+" enheter er ikke logget i dag"}</div>}
      {isEditor && units.length>0 &&
        <button className="btn btn-sm" style={{width:"100%",marginBottom:10}} onClick={exportTemp}>Eksporter temperaturlogg (CSV)</button>}

      {err && <div className="msg err">{err}</div>}
      {creating && isEditor && <TempUnitForm submitLabel="Opprett enhet" onSubmit={createUnit} onCancel={()=>setCreating(false)} />}

      {loading ? <div className="empty">Laster…</div> :
        units.length===0 ? <div className="empty">Ingen enheter enda.{isEditor?" Trykk «+ Ny enhet».":""}</div> :
        units.map(u=> editId===u.id && isEditor
          ? <TempUnitForm key={u.id} initial={u} submitLabel="Lagre enhet" onSubmit={(v)=>saveUnit(u.id,v)} onCancel={()=>setEditId(null)} />
          : (
          <div key={u.id} className={"unit"+(u.last_status==="avvik"?" avvik":"")}>
            <div className="unit-top">
              <div style={{minWidth:0}}>
                <div className="unit-name">{u.name}</div>
                <div className="unit-sub">{KIND_LABEL[u.kind]||"Annet"} · {rangeText(u.min_c,u.max_c)}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flex:"none"}}>
                {!loggedToday(u) && <span className="tbadge t-warn">Ikke logget i dag</span>}
                {u.last_value!=null && <span className={"tbadge "+(u.last_status==="avvik"?"t-avvik":"t-ok")}>{u.last_status==="avvik"?"Avvik":"OK"}</span>}
              </div>
            </div>
            <div className="unit-last">
              {u.last_value!=null
                ? <>Sist: <b>{u.last_value} °C</b> · {nbDateTime(u.last_at)}{u.last_by? " · "+u.last_by:""}</>
                : <span style={{color:"#9AA1A6"}}>Ingen avlesning enda</span>}
            </div>

            {isEditor && editId!==u.id &&
              <div style={{marginTop:8}}><button className="btn btn-sm" onClick={()=>{ setEditId(u.id); setCreating(false); }}>Rediger enhet</button></div>}

            <div className="readrow">
              <input className="in" type="number" step="0.1" inputMode="decimal" placeholder="Ny °C"
                value={vals[u.id]||""} onChange={e=>setVals(s=>({...s,[u.id]:e.target.value}))} onKeyDown={e=>{ if(e.key==="Enter") addReading(u.id); }} />
              <button className="btn btn-sm" onClick={()=>addReading(u.id)}>Lagre</button>
            </div>
            <input className="in" style={{marginTop:8}} placeholder="Merknad (påkrevd ved avvik)" value={notes[u.id]||""} onChange={e=>setNotes(s=>({...s,[u.id]:e.target.value}))} />

            <div style={{marginTop:10}}><button className="btn btn-sm" onClick={()=>toggleHist(u.id)}>{hist[u.id]?"Skjul historikk":"Vis historikk"}</button></div>
            {hist[u.id] && <div className="hist">
              {hist[u.id].length===0 ? <div style={{color:"#9AA1A6",fontSize:12.5}}>Ingen avlesninger.</div> :
                hist[u.id].map(r=>(
                  <div key={r.id} className="histrow">
                    <span className="hv" style={r.status==="avvik"?{color:"var(--alert-ink)"}:null}>{r.value_c} °C{r.status==="avvik"?" ⚠":""}</span>
                    <span>{nbDateTime(r.at)}{r.by? " · "+r.by:""}{r.note? " · "+r.note:""}</span>
                  </div>
                ))}
            </div>}
          </div>
        ))}
    </div>
  );
}

/* ---------- TAVLE (beskjeder / vaktoverlevering) ---------- */
function MessagesPage({session, onAuthFail}){
  const isEditor = session.role==="owner" || session.role==="admin";
  const [msgs,setMsgs]=useState([]); const [body,setBody]=useState("");
  const [err,setErr]=useState(""); const [loading,setLoading]=useState(true); const [busy,setBusy]=useState(false);
  const [pendingImage,setPendingImage]=useState(""); const [uploading,setUploading]=useState(false);
  const fileRef = useRef(null);

  const fetchMsgs=useCallback(async()=>{
    try{ const data=await rpc("messages_get",{p_token:session.token}); setMsgs(data||[]); setErr(""); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); }
    setLoading(false);
  },[session.token,onAuthFail]);
  useEffect(()=>{ fetchMsgs(); const id=setInterval(fetchMsgs,20000); const onF=()=>fetchMsgs();
    window.addEventListener("focus",onF); return ()=>{clearInterval(id); window.removeEventListener("focus",onF);}; },[fetchMsgs]);

  async function onPickFile(e){
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if(!file) return;
    setErr(""); setUploading(true);
    try{ const url = await uploadPhoto(file); setPendingImage(url); }
    catch(err){ setErr(err.message); }
    setUploading(false);
  }
  async function post(){
    if(!body.trim() && !pendingImage) return; setBusy(true);
    try{ await rpc("message_add",{p_token:session.token,p_body:body.trim()||null,p_image_url:pendingImage||null});
      setBody(""); setPendingImage(""); await fetchMsgs(); }
    catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); } setBusy(false); }
  async function op(fn,args){ try{ await rpc(fn,args); await fetchMsgs(); }catch(e){ if(isAuthErr(e)){onAuthFail();return;} setErr(e.message); } }

  return (
    <div className="pad">
      <div className="panel">
        <div className="eyebrow">Ny beskjed</div>
        <label className="fld"><input className="in" value={body} onChange={e=>setBody(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter") post(); }} placeholder="f.eks. Tom for tomater · Ovn 2 funker dårlig" /></label>
        <div className="imgrow">
          <button type="button" className="btn btn-sm" disabled={uploading} onClick={()=>fileRef.current&&fileRef.current.click()}>
            {uploading ? "Laster opp…" : (pendingImage ? "Bytt bilde" : "Legg ved bilde")}
          </button>
          {pendingImage && <button type="button" className="btn btn-danger" onClick={()=>setPendingImage("")}>Fjern bilde</button>}
        </div>
        {pendingImage && <a href={pendingImage} target="_blank" rel="noopener noreferrer"><img src={pendingImage} className="composethumb" alt="forhåndsvisning" /></a>}
        <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={onPickFile} />
        <button className="btn btn-primary" disabled={busy || uploading || (!body.trim() && !pendingImage)} onClick={post}>{busy?"Legger ut…":"Legg ut beskjed"}</button>
      </div>
      {err && <div style={{marginTop:12}} className="msg err">{err}</div>}
      <div className="eyebrow" style={{margin:"18px 4px 8px"}}>Tavle</div>
      {loading ? <div className="empty">Laster…</div> :
        msgs.length===0 ? <div className="empty">Ingen beskjeder.</div> :
        msgs.map(m=>(
          <div key={m.id} className={"msgcard"+(m.pinned?" pinned":"")+(m.resolved?" resolved":"")}>
            {(m.body || m.pinned) && <div className="msgbody">{m.pinned && <span className="pinmark">Festet</span>}{m.body}</div>}
            {m.image_url && <a href={m.image_url} target="_blank" rel="noopener noreferrer"><img src={m.image_url} className="msgimg" alt="bilde" /></a>}
            <div className="msgmeta">{m.author||"Ukjent"} · {nbDateTime(m.created_at)}{m.resolved && m.resolved_by? " · løst av "+m.resolved_by:""}</div>
            <div className="msgacts">
              {m.resolved
                ? <button className="btn btn-sm" onClick={()=>op("message_resolve",{p_token:session.token,p_id:m.id,p_resolved:false})}>Gjenåpne</button>
                : <button className="btn btn-sm" onClick={()=>op("message_resolve",{p_token:session.token,p_id:m.id,p_resolved:true})}>Løs</button>}
              {isEditor && <button className="btn btn-sm" onClick={()=>op("message_pin",{p_token:session.token,p_id:m.id,p_pinned:!m.pinned})}>{m.pinned?"Løsne":"Fest"}</button>}
              {isEditor && <Confirm className="btn btn-danger" label="Slett" ask="Slette?" onConfirm={()=>op("message_delete",{p_token:session.token,p_id:m.id})} />}
            </div>
          </div>
        ))}
    </div>
  );
}

/* ---------- OVERSIKT / LOGG ---------- */
function ActivityPage({session, onAuthFail}){
  const isEditor = session.role==="owner" || session.role==="admin";
  const isOwner = session.role==="owner";
  const [log,setLog]=useState([]); const [loading,setLoading]=useState(true); const [err,setErr]=useState("");
  const [day,setDay]=useState(""); const [exportText,setExportText]=useState("");

  const fetchLog = useCallback(async ()=>{
    try{ const data = await rpc("activity_get",{ p_token:session.token }); setLog(data||[]); setErr(""); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setLoading(false);
  },[session.token, onAuthFail]);

  // Forhåndslag CSV (live + arkiv) så delingsarket kan utløses synkront ved trykk – virker i både nettleser og PWA
  const buildExport = useCallback(async ()=>{
    if(!isEditor) return;
    try{ const data = await rpc("activity_export",{ p_token:session.token });
      const rows = (data||[]).map(e=>({ dato:dayKey(e.at), tid:nbTime(e.at), liste:LIST_LABEL[e.list]||e.list, oppgave:e.item_title, handling:e.action, hvem:e.actor||"" }));
      setExportText(rows.length ? buildCSV(rows) : ""); }
    catch(e){ /* stille – knappen melder fra hvis tom */ }
  },[session.token, isEditor]);

  useEffect(()=>{ fetchLog(); const id=setInterval(fetchLog,30000); const onF=()=>fetchLog();
    window.addEventListener("focus",onF); return ()=>{ clearInterval(id); window.removeEventListener("focus",onF); }; },[fetchLog]);
  useEffect(()=>{ buildExport(); const onF=()=>buildExport();
    window.addEventListener("focus",onF); return ()=>window.removeEventListener("focus",onF); },[buildExport]);

  function exportCSV(){
    if(!isEditor) return;
    if(!exportText){ setErr("Ingen logg å eksportere ennå"); return; }
    setErr("");
    const file = makeFile("kjokken-logg.csv", exportText, "text/csv;charset=utf-8;");
    saveOrShare(file).then(ok=>{ if(!ok) setErr("Eksport støttes ikke i denne nettleseren – prøv en annen."); }).catch(()=>{});
  }
  async function clearLog(){
    try{ await rpc("activity_clear",{ p_token:session.token }); setDay(""); await fetchLog(); await buildExport(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
  }

  const byDay={}; const dayOrder=[];
  log.forEach(e=>{ const k=dayKey(e.at); if(!byDay[k]){ byDay[k]=[]; dayOrder.push(k); } byDay[k].push(e); });
  const doneCount = log.filter(e=>e.action==="gjort").length;
  const missCount = log.filter(e=>e.action==="ikke gjort").length;
  const today = dayKey(new Date().toISOString());
  const minDay = (()=>{ const d=new Date(); d.setDate(d.getDate()-90); return dayKey(d.toISOString()); })();
  const idx = day ? dayOrder.indexOf(day) : -1;
  const olderDay = idx>=0 && idx<dayOrder.length-1 ? dayOrder[idx+1] : null;
  const newerDay = idx>0 ? dayOrder[idx-1] : null;

  const badge = a => a==="gjort" ? {cls:"b-done",txt:"Gjort"} : a==="ikke gjort" ? {cls:"b-miss",txt:"Ikke gjort"}
    : a==="angret" ? {cls:"b-undo",txt:"Angret"} : {cls:"b-reset",txt:"Nullstilt"};
  const renderEntry = (e,i)=>{ const b=badge(e.action); return (
    <div key={i} className="logitem">
      <span className={"lbadge "+b.cls}>{b.txt}</span>
      <div className="lbody">
        <div className="ltitle">{e.item_title}<span className="llist">{LIST_LABEL[e.list]||e.list}</span></div>
        <div className="lmeta">{nbTime(e.at)}{e.actor? " · "+e.actor:""}</div>
      </div>
    </div>
  ); };
  const labelFor = k => { const arr=byDay[k]; if(arr) return nbDay(arr[0].at); try{ return nbDay(k+"T12:00:00"); }catch(_){ return k; } };

  return (
    <div className="pad">
      <div className="panel">
        <div className="eyebrow">Oversikt – siste 90 dager</div>
        <div className="statrow">
          <div className="stat"><div className="num" style={{color:"var(--done)"}}>{doneCount}</div><div className="lab">gjort</div></div>
          <div className="stat"><div className="num" style={{color:"var(--alert-ink)"}}>{missCount}</div><div className="lab">ikke gjort</div></div>
        </div>
        {isEditor && <button className="btn btn-sm" style={{width:"100%"}} onClick={exportCSV}>Eksporter alt til CSV</button>}
        <div className="hint2" style={{marginTop:10}}>Eldre enn 90 dager arkiveres automatisk (slettes ikke). CSV inkluderer arkivet.</div>
      </div>

      <div className="daynav">
        <button className="nav" disabled={!olderDay} onClick={()=>olderDay&&setDay(olderDay)}>‹</button>
        <input type="date" value={day} min={minDay} max={today} onChange={e=>setDay(e.target.value)} />
        <button className="nav" disabled={!newerDay} onClick={()=>newerDay&&setDay(newerDay)}>›</button>
      </div>
      {day && <div className="dayclear"><button className="btn btn-sm" onClick={()=>setDay("")}>Vis alle dager</button></div>}

      {err && <div style={{marginTop:12}} className="msg err">{err}</div>}

      {loading ? <div className="empty">Laster…</div> :
        day ? (
          <div className="daygroup">
            <div className="dayhead">{labelFor(day)}</div>
            {(byDay[day]||[]).length===0 ? <div className="empty">Ingen aktivitet denne dagen.</div> : byDay[day].map(renderEntry)}
          </div>
        ) : (
          log.length===0 ? <div className="empty">Ingen aktivitet enda.</div> :
          dayOrder.map(k=>(
            <div key={k} className="daygroup">
              <div className="dayhead">{labelFor(k)}</div>
              {byDay[k].map(renderEntry)}
            </div>
          ))
        )}

      {isOwner && log.length>0 &&
        <div className="resetwrap">
          <Confirm className="btn btn-danger" label="Arkiver og tøm loggen" ask="Trykk igjen – arkiver alt" onConfirm={clearLog} />
        </div>}
    </div>
  );
}

/* ---------- EIER: brukere + roller ---------- */
function WorkersPage({session, onAuthFail}){
  const [workers,setWorkers]=useState([]);
  const [u,setU]=useState(""); const [p,setP]=useState(""); const [name,setName]=useState("");
  const [err,setErr]=useState(""); const [ok,setOk]=useState(""); const [busy,setBusy]=useState(false);
  const [loading,setLoading]=useState(true); const [pw,setPw]=useState({});

  const fetchWorkers = useCallback(async ()=>{
    try{ const data = await rpc("app_list_workers",{ p_token:session.token }); setWorkers(data||[]); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setLoading(false);
  },[session.token, onAuthFail]);
  useEffect(()=>{ fetchWorkers(); },[fetchWorkers]);

  async function create(){
    setErr(""); setOk("");
    if(!u.trim()||!p){ setErr("Brukernavn og passord må fylles ut"); return; }
    if(p.length < 4){ setErr("Passord bør være minst 4 tegn"); return; }
    setBusy(true);
    try{ await rpc("app_create_user",{ p_token:session.token, p_username:u.trim(), p_password:p, p_display_name:name.trim() });
      setOk("Konto opprettet for «"+(name.trim()||u.trim())+"»"); setU(""); setP(""); setName(""); await fetchWorkers(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
    setBusy(false);
  }
  async function remove(id){ try{ await rpc("app_delete_user",{ p_token:session.token, p_user_id:id }); await fetchWorkers(); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); } }
  async function setRole(id, role){ setErr(""); setOk("");
    try{ await rpc("app_set_role",{ p_token:session.token, p_user_id:id, p_role:role }); await fetchWorkers();
      setOk(role==="owner"?"Bruker er nå eier":role==="admin"?"Bruker er nå administrator":"Bruker er nå ansatt"); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); } }
  async function setPassword(id){
    const np = (pw[id]||"").trim();
    if(np.length < 4){ setErr("Nytt passord bør være minst 4 tegn"); return; }
    setErr(""); setOk("");
    try{ await rpc("app_set_password",{ p_token:session.token, p_user_id:id, p_new_password:np });
      setPw(s=>({ ...s, [id]:"" })); setOk("Passord oppdatert"); }
    catch(e){ if(isAuthErr(e)){ onAuthFail(); return; } setErr(e.message); }
  }

  return (
    <div className="pad">
      <div className="panel">
        <div className="eyebrow">Opprett ny bruker</div>
        {err && <div className="msg err">{err}</div>}
        {ok && <div className="msg ok">{ok}</div>}
        <label className="fld"><span className="lab">Visningsnavn (valgfritt)</span>
          <input className="in" value={name} onChange={e=>setName(e.target.value)} placeholder="f.eks. Enes" /></label>
        <label className="fld"><span className="lab">Brukernavn</span>
          <input className="in" autoCapitalize="none" autoCorrect="off" value={u} onChange={e=>setU(e.target.value)} placeholder="brukernavn" /></label>
        <label className="fld"><span className="lab">Passord</span>
          <input className="in" type="text" value={p} onChange={e=>setP(e.target.value)} placeholder="passord (du velger)" /></label>
        <button className="btn btn-primary" disabled={busy} onClick={create}>{busy ? "Oppretter…" : "Opprett bruker"}</button>
        <div className="hint2" style={{marginTop:10}}>Nye brukere blir ansatte. Administrator kan redigere lister, enheter og temperaturgrenser. Eier kan i tillegg styre brukere og roller. Du kan ha flere eiere.</div>
      </div>

      <div style={{margin:"18px 4px 0"}} className="eyebrow">Brukere ({workers.length})</div>
      {loading ? <div className="empty">Laster…</div> :
        workers.length === 0 ? <div className="empty">Ingen brukere enda.</div> :
        <div style={{marginTop:10}}>
          {workers.map(w=>{ const isOwnerRow = w.role==="owner"; return (
            <div key={w.id} className="wrow">
              <div className="wtop">
                <div style={{minWidth:0}}>
                  <div className="wname">{w.display_name}<span className={"rbadge "+(isOwnerRow?"r-owner":w.role==="admin"?"r-admin":"r-worker")}>{isOwnerRow?"Eier":w.role==="admin"?"Admin":"Ansatt"}</span></div>
                  <div className="wuser">@{w.username}</div>
                </div>
                {!isOwnerRow && <Confirm className="btn btn-danger" label="Slett" ask="Slette?" onConfirm={()=>remove(w.id)} />}
              </div>
              <div className="wactions">
                {isOwnerRow
                  ? <Confirm className="btn btn-danger" label="Fjern eier-tilgang" ask="Trykk igjen – fjern eier" onConfirm={()=>setRole(w.id,"admin")} />
                  : <>
                      {w.role==="admin"
                        ? <button className="btn btn-sm" onClick={()=>setRole(w.id,"worker")}>Fjern admin</button>
                        : <button className="btn btn-sm" onClick={()=>setRole(w.id,"admin")}>Gjør til admin</button>}
                      <Confirm className="btn btn-sm" label="Gjør til eier" ask="Trykk igjen – gi eier" onConfirm={()=>setRole(w.id,"owner")} />
                    </>}
              </div>
              {!isOwnerRow &&
                <div className="pwline">
                  <input className="in" type="text" placeholder="nytt passord" value={pw[w.id]||""} onChange={e=>setPw(s=>({ ...s, [w.id]:e.target.value }))} />
                  <button className="btn btn-sm" onClick={()=>setPassword(w.id)}>Sett</button>
                </div>}
            </div>
          ); })}
        </div>}
    </div>
  );
}

/* ---------- SHELL ---------- */
function Shell({session, onLogout, theme, onToggleTheme}){
  const isOwner = session.role === "owner";
  const [tab,setTab]=useState("prep");
  const [online,setOnline]=useState(typeof navigator!=="undefined" ? navigator.onLine : true);
  useEffect(()=>{ const on=()=>setOnline(true), off=()=>setOnline(false);
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return ()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); }; },[]);
  async function logout(){ try{ await rpc("app_logout",{ p_token:session.token }); }catch(e){} clearSession(); onLogout(); }

  const TABS = [["prep","Prep"],["lister","Lister"],["temp","Temp"],["tavle","Tavle"],["logg","Logg"]];
  if(isOwner) TABS.push(["workers","Ansatte"]);

  return (
    <div className="wrap">
      <div className="steel">
        <div className="topbar">
          <div className="brand">
            <h1>Kjøkken</h1>
            <div className="who">{session.display_name}<span className="role">{ROLE_LABEL[session.role]||session.role}</span></div>
          </div>
          <div className="topbtns">
            <ThemeToggle theme={theme} onToggle={onToggleTheme} />
            <button className="logout" onClick={logout}>Logg ut</button>
          </div>
        </div>
        {!online && <div className="offbar">Frakoblet – avhuking og endringer krever nett</div>}
      </div>
      <div className="tabs">
        {TABS.map(([k,label])=>(
          <div key={k} className={tab===k?"tab on":"tab"} onClick={()=>setTab(k)}>{label}</div>
        ))}
      </div>
      {tab==="workers" && isOwner ? <WorkersPage session={session} onAuthFail={onLogout} />
        : tab==="lister" ? <ListsPage session={session} onAuthFail={onLogout} />
        : tab==="temp" ? <TempPage session={session} onAuthFail={onLogout} />
        : tab==="tavle" ? <MessagesPage session={session} onAuthFail={onLogout} />
        : tab==="logg" ? <ActivityPage session={session} onAuthFail={onLogout} />
        : <PrepPage session={session} onAuthFail={onLogout} />}
    </div>
  );
}

/* ---------- APP ---------- */
function App(){
  const [session,setSession]=useState(loadSession());
  const logout = ()=>{ clearSession(); setSession(null); };

  const [theme,setTheme]=useState(()=> getStoredTheme() || systemTheme());
  const explicit = useRef(getStoredTheme()!==null);
  useEffect(()=>{ applyTheme(theme); },[theme]);
  useEffect(()=>{
    if(explicit.current) return;            // følg systemet til brukeren velger selv
    let mq; try{ mq=window.matchMedia("(prefers-color-scheme: dark)"); }catch(e){ return; }
    const onCh=()=>{ if(!explicit.current) setTheme(mq.matches?"dark":"light"); };
    if(mq.addEventListener) mq.addEventListener("change",onCh); else if(mq.addListener) mq.addListener(onCh);
    return ()=>{ if(mq.removeEventListener) mq.removeEventListener("change",onCh); else if(mq.removeListener) mq.removeListener(onCh); };
  },[]);
  const toggleTheme = ()=>{ explicit.current=true; setTheme(prev=>{ const next=prev==="dark"?"light":"dark"; try{ S.setItem(THEME_KEY,next); }catch(e){} return next; }); };

  if(!CONFIGURED){
    return (<div className="center-note"><div className="login-card">
      <div className="msg info"><b>Nesten klar.</b><br/>Lim inn Supabase-URL og anon-nøkkel øverst i koden, og kjør SQL-en i Supabase.</div>
    </div></div>);
  }
  return session
    ? <Shell session={session} onLogout={logout} theme={theme} onToggleTheme={toggleTheme} />
    : <Login onLogin={setSession} theme={theme} onToggleTheme={toggleTheme} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
